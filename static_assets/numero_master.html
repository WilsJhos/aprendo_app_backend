<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔢 Número Master</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0f172a; color:white; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; margin:0; }
        .question-text{font-size:3rem;margin:1rem;}
        .options-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;width:80%;}
        .math-btn{padding:1rem;font-size:2rem;border:none;border-radius:10px;background:#1a1640;color:white;cursor:pointer;}
        .math-btn:hover{background:#302b63;}
        .feedback{margin-top:1rem;font-size:1.2rem;}
    </style>
</head>
<body>
    <h1>🔢 Número Master</h1>
    <div class="question-text" id="question">2 + 2</div>
    <div class="options-grid" id="numOptions"></div>
    <div class="feedback" id="feedback"></div>

    <script>
    let currentAnswer=0;
    function nextQuestion(){
        const n1=Math.floor(Math.random()*10)+1;
        const n2=Math.floor(Math.random()*10)+1;
        currentAnswer=n1+n2;
        document.getElementById('question').textContent=`${n1} + ${n2}`;
        generateOptions(currentAnswer);
    }
    function generateOptions(correct){
        const opts=document.getElementById('numOptions');opts.innerHTML='';
        let arr=[correct];
        while(arr.length<4){let r=Math.floor(Math.random()*20)+1; if(!arr.includes(r)) arr.push(r);}arr.sort(()=>Math.random()-0.5);
        arr.forEach(v=>{const b=document.createElement('button');b.className='math-btn';b.textContent=v;b.onclick=()=>checkAnswer(v);opts.appendChild(b);});
    }
    function checkAnswer(sel){const fb=document.getElementById('feedback');if(sel===currentAnswer){fb.textContent='✅ Correcto';setTimeout(nextQuestion,1500);}else{fb.textContent='❌ Intenta otra vez';}}
    document.addEventListener('DOMContentLoaded',nextQuestion);
    </script>
</body>
</html>
