<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Misión Galaxia: Caza Letras</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: #000; font-family: 'Outfit', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        #game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #000;
            overflow: hidden;
        }

        canvas { display: block; width: 100%; height: 100%; }

        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            padding: 30px;
        }

        #top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        .lives-container { font-size: 2.5rem; filter: drop-shadow(0 0 5px #ff4757); }
        .score-container { text-align: right; }
        .score-val { font-size: 3.5rem; font-weight: 800; color: #00d2d3; display: block; line-height: 1; }
        .level-label { font-size: 1.2rem; color: #fff; opacity: 0.8; text-transform: uppercase; letter-spacing: 2px; }

        .feedback-msg {
            position: absolute;
            top: 40%; width: 100%; text-align: center;
            font-size: 5rem; font-weight: 900; color: #f9ca24;
            text-shadow: 0 0 30px rgba(249, 202, 36, 0.6);
            opacity: 0; transform: translateY(-50%) scale(0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .feedback-msg.show { opacity: 1; transform: translateY(-50%) scale(1); }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(15,23,42,0.95) 0%, rgba(0,0,0,1) 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; text-align: center; color: white;
            transition: opacity 0.5s;
        }
        .hidden { opacity: 0; pointer-events: none; }

        .overlay h1 { font-size: 5rem; margin-bottom: 20px; background: linear-gradient(to right, #00d2d3, #54a0ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(0,210,211,0.3)); }
        .overlay p { font-size: 1.5rem; opacity: 0.8; margin-bottom: 40px; }
        
        .btn-action {
            padding: 20px 60px; font-size: 1.8rem; font-weight: 800;
            background: linear-gradient(135deg, #ff9f43, #ff6b6b);
            border: none; border-radius: 60px; color: white; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 15px 30px rgba(255, 107, 107, 0.4);
            text-transform: uppercase;
        }
        .btn-action:hover { transform: scale(1.05) translateY(-5px); box-shadow: 0 20px 40px rgba(255, 107, 107, 0.6); }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .overlay h1 { font-size: 3rem; }
            .score-val { font-size: 2.5rem; }
            .lives-container { font-size: 1.5rem; }
        }
        .audio-settings-panel {
            position: fixed;
            top: 30px;
            right: 180px;
            z-index: 1000;
            display: flex;
            gap: 12px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            pointer-events: auto;
        }

        .audio-row { display: flex; align-items: center; gap: 8px; }

        .btn-audio-toggle {
            background: #00d2d3;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-audio-toggle.muted { background: #64748b; }

        .speed-selector {
            display: flex;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 3px;
        }

        .speed-opt {
            padding: 3px 6px;
            font-size: 0.65rem;
            font-weight: 800;
            border-radius: 6px;
            cursor: pointer;
            color: white;
            transition: all 0.2s;
            border: none;
            background: transparent;
        }

        .speed-opt.active { background: #00d2d3; }

        .label-sm { font-size: 0.6rem; font-weight: 700; color: white; opacity: 0.7; text-transform: uppercase; }

        @media (max-width: 600px) {
            .audio-settings-panel { top: 10px; right: 10px; padding: 5px; transform: scale(0.8); }
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="top-bar">
            <div id="lives-display" class="lives-container">❤️❤️❤️❤️❤️</div>
            <div class="score-container">
                <span class="level-label">Nivel <span id="inner-level">1</span></span>
                <span class="score-val" id="inner-score">0</span>
            </div>
        </div>
        <div id="feedback-msg" class="feedback-msg">¡GENIAL!</div>

        <div class="audio-settings-panel">
            <div class="audio-row">
                <span class="label-sm">Voz</span>
                <button onclick="toggleMute()" id="btn-mute-local" class="btn-audio-toggle">🔊</button>
            </div>
            <div class="audio-row" style="border-left: 1px solid rgba(255,255,255,0.1); padding-left: 8px;">
                <span class="label-sm">Velocidad</span>
                <div class="speed-selector">
                    <button onclick="setSpeed(1)" class="speed-opt" id="sp-1">x1</button>
                    <button onclick="setSpeed(1.5)" class="speed-opt" id="sp-1-5">x2</button>
                    <button onclick="setSpeed(2)" class="speed-opt" id="sp-2">x3</button>
                    <button onclick="setSpeed(3)" class="speed-opt" id="sp-3">x4</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Pantallas de Estado -->
    <div id="start-screen" class="overlay">
        <h1>MISIÓN GALAXIA</h1>
        <p>Captura las letras y números volantes.<br>¡Esquiva los asteroides peligrosos!</p>
        <button id="start-btn" class="btn-action">DESPEGAR 🚀</button>
    </div>

    <div id="game-over-screen" class="overlay hidden">
        <h1 style="color: #ff4757; -webkit-text-fill-color: #ff4757;">MISIÓN FALLIDA</h1>
        <p id="final-stats"></p>
        <button onclick="location.reload()" class="btn-action">REINTENTAR 🔄</button>
    </div>

    <div id="win-screen" class="overlay hidden">
        <h1 style="color: #48dbfb; -webkit-text-fill-color: #48dbfb;">¡HÉROE ESPACIAL!</h1>
        <p>Has conquistado la galaxia del saber.</p>
        <button onclick="location.reload()" class="btn-action">OTRA MISIÓN 🛰️</button>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('inner-score');
    const levelEl = document.getElementById('inner-level');
    const livesEl = document.getElementById('lives-display');
    const feedbackEl = document.getElementById('feedback-msg');
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    
    let gameRunning = false;
    let score = 0;
    let lives = 5;
    let level = 1;
    let gameSpeed = 3;

    // --- PLAYER ---
    const player = {
        x: 100, y: 300,
        width: 70, height: 45,
        targetX: 100, targetY: 300,
        trail: []
    };

    // --- OBJECTS ---
    let collectibles = [];
    let obstacles = [];
    let backgroundStars = [];
    let particles = [];
    let nebulae = [];

    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789".split("");

    function initBackground() {
        backgroundStars = [];
        for (let i = 0; i < 200; i++) {
            backgroundStars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2.5,
                speed: Math.random() * 0.8 + 0.2,
                opacity: Math.random()
            });
        }
        nebulae = [];
        for (let i = 0; i < 4; i++) {
            nebulae.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: 300 + Math.random() * 400,
                color: `hsla(${Math.random() * 360}, 60%, 40%, 0.12)`
            });
        }
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        initBackground();
    }
    window.addEventListener('resize', resize);
    resize();

    // --- INPUT ---
    window.addEventListener('mousemove', (e) => {
        if (!gameRunning) return;
        player.targetX = e.clientX - player.width/2;
        player.targetY = e.clientY - player.height/2;
    });

    canvas.addEventListener('touchmove', (e) => {
        if (!gameRunning) return;
        const touch = e.touches[0];
        player.targetX = touch.clientX - player.width/2;
        player.targetY = touch.clientY - player.height/2;
    }, { passive: false });

    // --- LOGIC ---
    function spawnCollectible() {
        collectibles.push({
            x: canvas.width + 50,
            y: Math.random() * (canvas.height - 100) + 50,
            char: chars[Math.floor(Math.random() * chars.length)],
            speed: gameSpeed + Math.random() * 3,
            rot: 0,
            rotSpeed: (Math.random() - 0.5) * 0.1
        });
    }

    function spawnObstacle() {
        obstacles.push({
            x: canvas.width + 100,
            y: Math.random() * (canvas.height - 100) + 50,
            r: 25 + Math.random() * 40,
            speed: gameSpeed + Math.random() * 4,
            rot: 0,
            rotSpeed: (Math.random() - 0.5) * 0.08
        });
    }

    function spawnExplosion(x, y, color) {
        for (let i = 0; i < 15; i++) {
            particles.push({
                x, y,
                vx: (Math.random() - 0.5) * 12,
                vy: (Math.random() - 0.5) * 12,
                life: 1.0,
                color: color || '#fff',
                size: Math.random() * 5 + 2
            });
        }
    }

    function update() {
        // Player smooth interpolation
        player.x += (player.targetX - player.x) * 0.15;
        player.y += (player.targetY - player.y) * 0.15;

        // Parallax stars
        backgroundStars.forEach(s => {
            s.x -= s.speed * (gameSpeed * 0.5);
            if (s.x < 0) s.x = canvas.width;
        });

        // Collectibles
        for (let i = collectibles.length - 1; i >= 0; i--) {
            const c = collectibles[i];
            c.x -= c.speed;
            c.rot += c.rotSpeed;
            
            const dx = (player.x + player.width/2) - c.x;
            const dy = (player.y + player.height/2) - c.y;
            if (Math.sqrt(dx*dx + dy*dy) < 50) {
                score += 10;
                scoreEl.innerText = score;
                spawnExplosion(c.x, c.y, '#00f2fe');
                speak(c.char);
                collectibles.splice(i, 1);
                checkLevel();
                continue;
            }
            if (c.x < -100) collectibles.splice(i, 1);
        }

        // Obstacles
        for (let i = obstacles.length - 1; i >= 0; i--) {
            const o = obstacles[i];
            o.x -= o.speed;
            o.rot += o.rotSpeed;

            const dx = (player.x + player.width/2) - o.x;
            const dy = (player.y + player.height/2) - o.y;
            if (Math.sqrt(dx*dx + dy*dy) < o.r + 20) {
                takeDamage();
                spawnExplosion(player.x + 30, player.y + 20, '#ff4757');
                obstacles.splice(i, 1);
                continue;
            }
            if (o.x < -150) obstacles.splice(i, 1);
        }

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx; p.y += p.vy; p.life -= 0.02;
            if (p.life <= 0) particles.splice(i, 1);
        }

        if (Math.random() < 0.04) spawnCollectible();
        if (Math.random() < 0.02 + (level * 0.005)) spawnObstacle();
    }

    function takeDamage() {
        lives--;
        livesEl.innerText = '❤️'.repeat(lives);
        showFeedback('¡DAÑO RECIBIDO!');
        shake();
        if (lives <= 0) {
            gameRunning = false;
            gameOverScreen.classList.remove('hidden');
            document.getElementById('final-stats').innerText = `Puntaje Final: ${score} - Nivel: ${level}`;
        }
    }

    function checkLevel() {
        if (score >= level * 100) {
            level++;
            gameSpeed += 1;
            levelEl.innerText = level;
            showFeedback(`¡NIVEL ${level}!`);
            speak(`¡Excelente! Subes al nivel ${level}`);
        }
    }

    function shake() {
        canvas.style.animation = 'shake 0.2s';
        setTimeout(() => canvas.style.animation = '', 200);
    }

    // --- DRAW ---
    function draw() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Nebulae
        nebulae.forEach(n => {
            const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
            grad.addColorStop(0, n.color);
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.fillRect(0,0, canvas.width, canvas.height);
        });

        // Stars
        ctx.fillStyle = '#fff';
        backgroundStars.forEach(s => {
            ctx.globalAlpha = s.opacity;
            ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
        });
        ctx.globalAlpha = 1.0;

        // Collectibles (Letters/Numbers)
        collectibles.forEach(c => {
            ctx.save();
            ctx.translate(c.x, c.y);
            ctx.rotate(c.rot);
            ctx.shadowBlur = 20; ctx.shadowColor = '#00f2fe';
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 45px Outfit';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(c.char, 0, 0);
            ctx.restore();
        });

        // Obstacles (Asteroids)
        obstacles.forEach(o => {
            ctx.save();
            ctx.translate(o.x, o.y);
            ctx.rotate(o.rot);
            ctx.fillStyle = '#4b5563';
            ctx.beginPath();
            for(let i=0; i<10; i++) {
                const angle = (i/10) * Math.PI * 2;
                const r = o.r * (0.8 + Math.random() * 0.4);
                ctx.lineTo(Math.cos(angle)*r, Math.sin(angle)*r);
            }
            ctx.closePath(); ctx.fill();
            ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 3; ctx.stroke();
            ctx.restore();
        });

        // Player (Spaceship)
        drawShip(player.x, player.y, player.width, player.height);

        // Particles
        particles.forEach(p => {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
            ctx.fill();
        });
        ctx.globalAlpha = 1.0;
    }

    function drawShip(x, y, w, h) {
        ctx.save();
        ctx.translate(x, y);
        
        // Engine Glow
        const flameSize = 15 + Math.random() * 20;
        const grad = ctx.createLinearGradient(-flameSize, h/2, 0, h/2);
        grad.addColorStop(0, 'rgba(255,165,0,0)');
        grad.addColorStop(1, 'rgba(255,165,0,0.8)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.moveTo(0, h/2-10); ctx.lineTo(-flameSize, h/2); ctx.lineTo(0, h/2+10);
        ctx.fill();

        // Ship Body
        ctx.fillStyle = '#f8fafc';
        ctx.beginPath();
        ctx.moveTo(0, 0); ctx.lineTo(w, h/2); ctx.lineTo(0, h); ctx.lineTo(15, h/2);
        ctx.closePath(); ctx.fill();

        // Cockpit
        ctx.fillStyle = '#38bdf8';
        ctx.beginPath();
        ctx.ellipse(w*0.5, h*0.5, 12, 6, 0, 0, Math.PI*2);
        ctx.fill();

        // Decorative lines
        ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 2; ctx.stroke();
        ctx.restore();
    }

    let isMuted = localStorage.getItem('game_muted') === 'true';
    let voiceSpeed = parseFloat(localStorage.getItem('game_speed') || '1.0');

    function updateAudioUI() {
        const btn = document.getElementById('btn-mute-local');
        if(btn) btn.textContent = isMuted ? '🔇' : '🔊';
        document.querySelectorAll('.speed-opt').forEach(opt => opt.classList.remove('active'));
        const active = document.getElementById('sp-' + voiceSpeed.toString().replace('.','-'));
        if(active) active.classList.add('active');
    }

    function toggleMute() {
        isMuted = !isMuted;
        localStorage.setItem('game_muted', isMuted);
        updateAudioUI();
    }

    function setSpeed(s) {
        voiceSpeed = s;
        localStorage.setItem('game_speed', s);
        updateAudioUI();
    }

    function speak(text) {
        if (isMuted || !('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'es-ES'; u.rate = voiceSpeed * 1.2;
        window.speechSynthesis.speak(u);
    }

    document.addEventListener('DOMContentLoaded', updateAudioUI);

    function showFeedback(text) {
        feedbackEl.innerText = text;
        feedbackEl.classList.add('show');
        setTimeout(() => feedbackEl.classList.remove('show'), 1500);
    }

    function gameLoop() {
        if (!gameRunning) return;
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    document.getElementById('start-btn').addEventListener('click', () => {
        startScreen.classList.add('hidden');
        gameRunning = true;
        gameLoop();
        speak("¡Misión iniciada, Capitán!");
    });
});
</script>

<style>
    @keyframes shake {
        0%, 100% { transform: translate(0,0); }
        25% { transform: translate(10px, 10px); }
        50% { transform: translate(-10px, -10px); }
        75% { transform: translate(10px, -10px); }
    }
</style>

</body>
</html>
