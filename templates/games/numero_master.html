{% extends "game_base.html" %}

{% block game_title %}🔢 Número Master{% endblock %}

{% block container_extra_class %}premium-game-container{% endblock %}

{% block game_css %}
<style>
    :root {
        /* Base Math Colors */
        --primary: #00f2fe;
        --secondary: #4facfe;
        --success: #4caf50;
        --warning: #f9ca24;
        --error: #ff7675;
        
        /* Theme Light (Default) */
        --math-card-bg: rgba(255, 255, 255, 0.9);
        --math-card-border: rgba(255, 255, 255, 0.5);
        --math-text: #2d3436;
        --math-text-muted: #636e72;
        --math-shadow: 0 10px 20px rgba(0,0,0,0.1);
        --math-hover-shadow: 0 15px 35px rgba(0,0,0,0.2);
        
        --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    [data-theme='dark'] {
        --math-card-bg: rgba(15, 23, 42, 0.85);
        --math-card-border: rgba(255, 255, 255, 0.1);
        --math-text: #dfe6e9;
        --math-text-muted: #b2bec3;
        --math-shadow: 0 10px 30px rgba(0,0,0,0.4);
        --math-hover-shadow: 0 15px 50px rgba(0,0,0,0.6);
        --primary: #00cec9;
    }

    /* Global Tweaks */
    .game-container {
        background: var(--bg-gradient) !important;
        transition: background 0.5s ease;
    }

    .question-card {
        background: var(--math-card-bg);
        backdrop-filter: blur(15px);
        border: 1px solid var(--math-card-border);
        border-radius: 24px;
        padding: clamp(1.5rem, 5vw, 3rem);
        text-align: center;
        width: 100%;
        max-width: 600px;
        box-shadow: var(--math-shadow);
        margin-bottom: 2rem;
        transition: var(--transition);
        animation: fadeInUp 0.5s ease;
    }

    .question-text {
        font-size: clamp(3.5rem, 15vw, 7rem);
        font-weight: 900;
        letter-spacing: -2px;
        background: linear-gradient(135deg, var(--math-text) 30%, var(--primary) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        margin: 1rem 0;
        line-height: 1;
    }

    .options-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
        width: 100%;
        max-width: 500px;
        margin: 0 auto;
    }

    .math-btn {
        background: var(--math-card-bg);
        border: 2px solid var(--math-card-border);
        border-radius: 20px;
        padding: clamp(1rem, 6vw, 2.5rem);
        font-size: clamp(2rem, 10vw, 4rem);
        font-weight: 900;
        color: var(--primary);
        cursor: pointer;
        transition: var(--transition);
        box-shadow: var(--math-shadow);
    }

    .math-btn:hover {
        background: linear-gradient(135deg, var(--secondary), var(--primary));
        color: white;
        border-color: white;
        transform: translateY(-8px) scale(1.05);
        box-shadow: var(--math-hover-shadow);
    }

    .theme-toggle-container {
        position: absolute;
        top: 20px;
        right: 20px;
        z-index: 100;
    }

    .theme-btn {
        background: var(--primary);
        color: white;
        border: none;
        width: 45px;
        height: 45px;
        border-radius: 12px;
        cursor: pointer;
        font-size: 1.5em;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: var(--transition);
        box-shadow: var(--math-shadow);
    }

    .theme-btn:hover {
        transform: translateY(-3px) scale(1.1);
        box-shadow: var(--math-hover-shadow);
    }

    .instruction { font-size: 1.6rem; color: var(--math-text-muted); font-weight: 600; margin-bottom: 15px; }

    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    /* Fix stats contrast */
    .stats {
        background: var(--math-card-bg) !important;
        border: 1px solid var(--math-card-border) !important;
        color: var(--math-text) !important;
    }
    .stat-value { color: var(--primary) !important; }

</style>

{% endblock %}

{% block game_area %}
    <div class="question-card">
        <div class="instruction">¿Cuál es el resultado?</div>
        <div class="question-text" id="question">2 + 2</div>
    </div>
    <div class="options-grid" id="numOptions"></div>
{% endblock %}

{% block game_js %}
    <script>
        let currentAnswer = 0;

        const operators = [
            { symbol: '+', name: 'más' },
            { symbol: '-', name: 'menos' },
            { symbol: '×', name: 'por' },
            { symbol: '÷', name: 'entre' }
        ];

        function nextQuestion() {
            const opObj = operators[Math.floor(Math.random() * operators.length)];
            let n1, n2, result;

            if (opObj.symbol === '+') {
                n1 = Math.floor(Math.random() * 10) + 1;
                n2 = Math.floor(Math.random() * 10) + 1;
                result = n1 + n2;
            } else if (opObj.symbol === '-') {
                n1 = Math.floor(Math.random() * 20) + 10;
                n2 = Math.floor(Math.random() * 10) + 1;
                result = n1 - n2;
            } else if (opObj.symbol === '×') {
                n1 = Math.floor(Math.random() * 9) + 1;
                n2 = Math.floor(Math.random() * 9) + 1;
                result = n1 * n2;
            } else { // Division
                result = Math.floor(Math.random() * 9) + 1;
                n2 = Math.floor(Math.random() * 9) + 1;
                n1 = n2 * result;
            }

            currentAnswer = result;
            
            const qEl = document.getElementById('question');
            if (qEl) {
                qEl.textContent = `${n1} ${opObj.symbol} ${n2}`;
                qEl.classList.add('anim-elem');
                setTimeout(()=> qEl.classList.add('anim-appear'), 30);
            }
            
            generateOptions(currentAnswer);

            const voiceText = `¿Cuánto es ${n1} ${opObj.name} ${n2}?`;
            speakText(voiceText);
        }

        function generateOptions(correct) {
            const optsDiv = document.getElementById('numOptions');
            optsDiv.innerHTML = '';
            let options = [correct];
            while(options.length < 4) {
                // Rango más amplio para operaciones más complejas
                let r = correct + Math.floor(Math.random() * 30) - 15;
                if(r < 0) r = Math.floor(Math.random() * 20);
                if(!options.includes(r)) options.push(r);
            }
            options.sort(() => Math.random() - 0.5);
            
            options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'math-btn anim-elem';
                btn.textContent = opt;
                btn.onclick = () => checkAnswer(opt);
                optsDiv.appendChild(btn);
                setTimeout(()=> btn.classList.add('anim-appear'), 80 * i + 40);
            });
        }

        function checkAnswer(selected) {
            try {
                if(selected === currentAnswer) {
                    showFeedback('¡Excelente! 💎', true);
                    updateStats(10, true);
                    setTimeout(nextQuestion, 2000);
                } else {
                    showFeedback('Sigue intentando 💪', false);
                    updateStats(0, false);
                }
            } catch(err) {
                console.error('checkAnswer error', err);
            }
        }

        function initGame() {
            console.log('numero_master init');
            applyMathTheme();
            
            if (typeof createMagicParticles === 'function') {
                createMagicParticles(['1','2','3','4','5','6','7','8','9','0','+','-','×','÷','=']);
            }
            nextQuestion();
        }

        window.addEventListener('themeChanged', (e) => {
            const btn = document.getElementById('mathThemeBtn');
            if (btn) btn.textContent = (e.detail.theme === 'dark') ? '☀️' : '🌙';
        });

        function applyMathTheme() {
            const theme = localStorage.getItem('game_theme') || 'light';
            const btn = document.getElementById('mathThemeBtn');
            if (btn) btn.textContent = (theme === 'dark') ? '☀️' : '🌙';
        }

        function speakText(text, rate = 1.0, pitch = 1.0) {
            try {
                if (window.FlutterTTS && window.FlutterTTS.postMessage) {
                    window.FlutterTTS.postMessage(JSON.stringify({text, rate, pitch}));
                    return;
                }
                if (window.flutter_inappwebview && window.flutter_inappwebview.callHandler) {
                    
                    try { window.flutter_inappwebview.callHandler('FlutterTTS', {text, rate, pitch}); return; } catch(e){}
                }
                if (window.speak) {
                    window.speak(text, rate, pitch);
                    return;
                }
                if ('speechSynthesis' in window) {
                    const u = new SpeechSynthesisUtterance(text);
                    u.lang = 'es-ES';
                    u.rate = rate;
                    u.pitch = pitch;
                    window.speechSynthesis.cancel();
                    window.speechSynthesis.speak(u);
                    return;
                }
                console.warn('No TTS available for:', text);
            } catch (err) {
                console.error('speakText error', err);
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initGame);
        } else {
            initGame();
        }
    </script>
{% endblock %}
