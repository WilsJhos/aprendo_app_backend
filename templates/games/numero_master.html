{% extends "game_base.html" %}
<!-- numero_master template rebuilt minimal version -->

{% block game_title %}🔢 Número Master{% endblock %}

{% block container_extra_class %}force-dark-game{% endblock %}

{% block game_css %}
<style>
    :root {
        --math-accent: #00f2fe;
        --math-secondary: #4facfe;
    }

    /* Smooth transitions reused from terapeutico */
    .anim-enter { animation: fadeInUp 320ms ease both; }
    .anim-leave { animation: fadeOutDown 300ms ease both; }
    .anim-elem { opacity: 0; transform: translateY(8px) scale(0.98); transition: transform 260ms ease, opacity 260ms ease; }
    .anim-elem.anim-appear { opacity: 1; transform: translateY(0) scale(1); }

    @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeOutDown { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(12px); } }

    /* Force dark theme for this game regardless of global theme */
    div.game-container {
        background: #0f172a !important;
        background: radial-gradient(circle at center, #0c4a6e 0%, #0f172a 100%) !important;
        color: white !important;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px;
    }

    .question-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        padding: clamp(1rem, 4vw, 2rem);
        text-align: center;
        width: 100%;
        max-width: 500px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        margin-bottom: 1rem;
    }

    .question-text {
        font-size: clamp(2.5rem, 12vw, 5rem);
        font-weight: 900;
        letter-spacing: -1px;
        background: linear-gradient(135deg, white 0%, var(--math-accent) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        margin: 0.5rem 0;
    }

    .options-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: clamp(8px, 2vw, 15px);
        width: 100%;
        max-width: 500px;
        margin: 0 auto;
    }

    .math-btn {
        background: rgba(255, 255, 255, 0.08);
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: clamp(0.75rem, 5vw, 2rem);
        font-size: clamp(1.2rem, 7vw, 3rem);
        font-weight: 800;
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    @media (max-height: 700px) {
        .question-card { padding: 1rem; margin-bottom: 1rem; }
        .question-text { font-size: 3.5rem; }
        .math-btn { padding: 1.2rem; font-size: 2rem; }
    }

    .math-btn:hover {
        background: linear-gradient(135deg, var(--math-secondary), var(--math-accent));
        border-color: white;
        transform: translateY(-5px);
        box-shadow: 0 10px 30px rgba(0, 242, 254, 0.3);
    }

    .instruction { font-size: 1.5rem; opacity: 0.8; margin-bottom: 10px; }

</style>
{% endblock %}

{% block game_area %}
    <div class="question-card">
        <div class="instruction">¿Cuál es el resultado?</div>
        <div class="question-text" id="question">2 + 2</div>
    </div>
    <div class="options-grid" id="numOptions"></div>
{% endblock %}

{% block game_js %}
    <script>
        let currentAnswer = 0;

        function nextQuestion() {
            const n1 = Math.floor(Math.random() * 10) + 1;
            const n2 = Math.floor(Math.random() * 10) + 1;
            currentAnswer = n1 + n2;
            
            const qEl = document.getElementById('question');
            if (qEl) {
                qEl.textContent = `${n1} + ${n2}`;
                qEl.classList.add('anim-elem');
                setTimeout(()=> qEl.classList.add('anim-appear'), 30);
            }
            
            generateOptions(currentAnswer);

            // Use a robust speak wrapper: prefer Flutter bridge, fallback to Web Speech API
            if (typeof speakText === 'function') {
                speakText(`¿Cuánto es ${n1} más ${n2}?`);
            } else if (window.speak) {
                window.speak(`¿Cuánto es ${n1} más ${n2}?`);
            } else if ('speechSynthesis' in window) {
                const u = new SpeechSynthesisUtterance(`¿Cuánto es ${n1} más ${n2}?`);
                u.lang = 'es-ES';
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(u);
            }
        }

        function generateOptions(correct) {
            const optsDiv = document.getElementById('numOptions');
            optsDiv.innerHTML = '';
            let options = [correct];
            while(options.length < 4) {
                let r = Math.floor(Math.random() * 20) + 1;
                if(!options.includes(r)) options.push(r);
            }
            options.sort(() => Math.random() - 0.5);
            
            options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'math-btn anim-elem';
                btn.textContent = opt;
                btn.onclick = () => checkAnswer(opt);
                optsDiv.appendChild(btn);
                setTimeout(()=> btn.classList.add('anim-appear'), 80 * i + 40);
            });
        }

        function checkAnswer(selected) {
            try {
                if(selected === currentAnswer) {
                    showFeedback('¡Excelente! 💎', true);
                    updateStats(10, true);
                    setTimeout(nextQuestion, 2000);
                } else {
                    showFeedback('Sigue intentando 💪', false);
                    updateStats(0, false);
                }
            } catch(err) {
                console.error('checkAnswer error', err);
            }
        }

        function initGame() {
            console.log('numero_master init');
            // particle generator optional
            if (typeof createMagicParticles === 'function') {
                createMagicParticles(['1','2','3','4','5','6','7','8','9','0','+','=','%']);
            }
            nextQuestion();
        }

        // Robust speech helper: tries Flutter bridge, then Web Speech API
        function speakText(text, rate = 1.0, pitch = 1.0) {
            try {
                if (window.FlutterTTS && window.FlutterTTS.postMessage) {
                    window.FlutterTTS.postMessage(JSON.stringify({text, rate, pitch}));
                    return;
                }
                if (window.flutter_inappwebview && window.flutter_inappwebview.callHandler) {
                    // some Flutter WebView variants expose callHandler
                    try { window.flutter_inappwebview.callHandler('FlutterTTS', {text, rate, pitch}); return; } catch(e){}
                }
                if (window.speak) {
                    window.speak(text, rate, pitch);
                    return;
                }
                if ('speechSynthesis' in window) {
                    const u = new SpeechSynthesisUtterance(text);
                    u.lang = 'es-ES';
                    u.rate = rate;
                    u.pitch = pitch;
                    window.speechSynthesis.cancel();
                    window.speechSynthesis.speak(u);
                    return;
                }
                console.warn('No TTS available for:', text);
            } catch (err) {
                console.error('speakText error', err);
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initGame);
        } else {
            initGame();
        }
    </script>
{% endblock %}
