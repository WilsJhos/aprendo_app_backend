{% extends "game_base.html" %}

{% block game_title %}🎶 Simón Musical{% endblock %}

{% block container_extra_class %}force-dark-game{% endblock %}

{% block game_css %}
<style>
    :root {
        --verde: #00e676;
        --rojo: #ff1744;
        --amarillo: #ffea00;
        --azul: #2979ff;
    }

    #game-board {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        height: clamp(300px, 70vh, 600px);
        max-width: 600px;
        width: 100%;
        gap: 12px;
        padding: 12px;
        margin: 0 auto;
        position: relative;
    }

    .pad {
        position: relative;
        aspect-ratio: 1;
        cursor: pointer;
        opacity: 0.6;
        transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        border: 6px solid rgba(255, 255, 255, 0.1);
        border-radius: 32px;
    }

    #pad-green { background-color: var(--verde); box-shadow: 0 10px 20px rgba(0, 230, 118, 0.2); }
    #pad-red { background-color: var(--rojo); box-shadow: 0 10px 20px rgba(255, 23, 68, 0.2); }
    #pad-yellow { background-color: var(--amarillo); box-shadow: 0 10px 20px rgba(255, 234, 0, 0.2); }
    #pad-blue { background-color: var(--azul); box-shadow: 0 10px 20px rgba(41, 121, 255, 0.2); }

    .pad.active {
        opacity: 1;
        transform: scale(0.96);
        filter: brightness(1.3);
        box-shadow: 0 0 50px rgba(255, 255, 255, 0.5);
        z-index: 10;
        border-color: white;
    }
    
    .pad.playing {
        opacity: 1;
        transform: scale(1.05);
        filter: brightness(1.5);
        box-shadow: 0 0 80px currentColor;
    }

    #center-hub {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 140px; height: 140px;
        background: rgba(15, 23, 42, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 50%;
        border: 4px solid #334155;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 100;
        box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        pointer-events: none;
    }

    #score-display { font-size: 3rem; font-weight: 900; line-height: 1; color: white; }
    #message-display { font-size: 0.8rem; font-weight: 700; color: var(--accent-color); text-transform: uppercase; }

    .btn-restart { margin-top: 20px; }

    #block-layer {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 2000; display: none;
    }
</style>
{% endblock %}

{% block game_area %}
    <div id="game-board">
        <div id="pad-green" class="pad" onclick="handleInput('green')"></div>
        <div id="pad-red" class="pad" onclick="handleInput('red')"></div>
        <div id="pad-yellow" class="pad" onclick="handleInput('yellow')"></div>
        <div id="pad-blue" class="pad" onclick="handleInput('blue')"></div>

        <div id="center-hub">
            <div id="score-display">1</div>
            <div id="message-display">¡LISTO!</div>
        </div>
    </div>

    <button class="btn btn-accion btn-restart" onclick="reiniciarJuego()">🔄 Reiniciar Juego</button>

    <div id="block-layer"></div>
{% endblock %}

{% block game_js %}
<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    const frequencies = { 
        green: 261.63,  
        red: 329.63,    
        yellow: 392.00, 
        blue: 523.25,   
        error: 120 
    };

    function playTone(color, duration = 0.5) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        const osc1 = audioCtx.createOscillator();
        const osc2 = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();

        osc1.type = color === 'error' ? 'sawtooth' : 'sine';
        osc2.type = color === 'error' ? 'square' : 'triangle';
        
        const freq = frequencies[color];
        osc1.frequency.value = freq;
        osc2.frequency.value = freq * 1.005;

        filter.type = "lowpass";
        filter.frequency.value = color === 'error' ? 400 : 2000;

        osc1.connect(filter);
        osc2.connect(filter);
        filter.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        const now = audioCtx.currentTime;
        gainNode.gain.setValueAtTime(0, now);
        gainNode.gain.linearRampToValueAtTime(0.2, now + 0.1);
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);

        osc1.start(now);
        osc2.start(now);
        osc1.stop(now + duration);
        osc2.stop(now + duration);
    }

    const colors = ['green', 'red', 'yellow', 'blue'];
    let gameSequence = [];
    let playerSequence = [];
    let level = 1;
    let speed = 800;
    let isGameActive = false;

    function resetVariables() {
        gameSequence = [];
        playerSequence = [];
        level = 1;
        speed = 800;
        actualizarHUD("¡Atento!", 1);
    }

    function reiniciarJuego() {
        resetVariables();
        setTimeout(playRound, 500);
    }

    function playRound() {
        bloquearInput(true);
        playerSequence = [];
        actualizarHUD("Observa...", level);
        const randomColor = colors[Math.floor(Math.random() * colors.length)];
        gameSequence.push(randomColor);
        speed = Math.max(300, 800 - (level * 40));

        let i = 0;
        const interval = setInterval(() => {
            activarPad(gameSequence[i], true);
            i++;
            if (i >= gameSequence.length) {
                clearInterval(interval);
                setTimeout(() => {
                    bloquearInput(false);
                    actualizarHUD("¡Tu turno!", level);
                }, speed);
            }
        }, speed + 100);
    }

    function activarPad(color, isSimon) {
        const pad = document.getElementById(`pad-${color}`);
        const className = isSimon ? 'playing' : 'active';
        pad.classList.add(className);
        playTone(color, speed / 1000);
        setTimeout(() => pad.classList.remove(className), speed * 0.7);
    }

    function handleInput(color) {
        if (!isGameActive) return;
        const pad = document.getElementById(`pad-${color}`);
        pad.classList.add('active');
        playTone(color, 0.3);
        setTimeout(() => pad.classList.remove('active'), 150);
        playerSequence.push(color);
        const index = playerSequence.length - 1;
        if (playerSequence[index] !== gameSequence[index]) {
            gameOver();
            return;
        }
        if (playerSequence.length === gameSequence.length) {
            bloquearInput(true);
            actualizarHUD("¡Genial!", level);
            level++;
            setTimeout(playRound, 1000);
        }
    }

    function gameOver() {
        bloquearInput(true);
        playTone('error', 1);
        actualizarHUD("¡Ups!", level);
        if(window.speak) {
            window.speak("¡Oh no! Inténtalo de nuevo");
        }
        
        const board = document.getElementById('game-board');
        board.style.filter = "sepia(1) hue-rotate(-50deg) saturate(5)";
        setTimeout(() => {
            board.style.filter = "";
            reiniciarJuego();
        }, 1500);
    }

    function bloquearInput(bloquear) {
        const layer = document.getElementById('block-layer');
        if(layer) layer.style.display = bloquear ? 'block' : 'none';
        isGameActive = !bloquear;
    }

    function actualizarHUD(texto, nivel) {
        document.getElementById('message-display').innerText = texto;
        document.getElementById('score-display').innerText = nivel;
        if(typeof updateStats === 'function') {
            updateStats(0, true); // Actualizar nivel visualmente en el base si es necesario
        }
    }

    document.addEventListener('DOMContentLoaded', () => { 
        setTimeout(playRound, 1500); 
    });
</script>
{% endblock %}
