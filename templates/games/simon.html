{% extends "game_base.html" %}

{% block game_title %}🎶 Simón Musical{% endblock %}

{% block game_css %}
<style>
    :root {
        --verde: #00e676;
        --rojo: #ff1744;
        --amarillo: #ffea00;
        --azul: #2979ff;
        --border-thick: 8px solid rgba(0, 0, 0, 0.4);
    }

    .game-container { 
        padding: 0; 
        max-width: 100vw; 
        width: 100%; 
        height: 100%; 
        border-radius: 0; 
        overflow: hidden;
        background: #000;
    }

    #game-board {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        height: calc(100vh - 80px); /* Adjust for header */
        width: 100%;
        gap: 10px;
        padding: 10px;
        background: #111;
    }

    .pad {
        position: relative;
        width: 100%;
        height: 100%;
        cursor: pointer;
        opacity: 0.5;
        transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        border: var(--border-thick);
        border-radius: 24px;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    #pad-green { background-color: var(--verde); box-shadow: 0 0 20px rgba(0, 230, 118, 0.2); }
    #pad-red { background-color: var(--rojo); box-shadow: 0 0 20px rgba(255, 23, 68, 0.2); }
    #pad-yellow { background-color: var(--amarillo); box-shadow: 0 0 20px rgba(255, 234, 0, 0.2); }
    #pad-blue { background-color: var(--azul); box-shadow: 0 0 20px rgba(41, 121, 255, 0.2); }

    .pad.active {
        opacity: 1;
        transform: scale(0.96);
        filter: brightness(1.3);
        box-shadow: 0 0 80px rgba(255, 255, 255, 0.6);
        z-index: 10;
        border-color: white;
    }
    
    .pad.playing {
        opacity: 1;
        transform: scale(1.05);
        filter: brightness(1.5);
        box-shadow: 0 0 100px currentColor;
    }

    #center-hub {
        position: absolute;
        top: 55%; left: 50%;
        transform: translate(-50%, -50%);
        width: 220px; height: 220px;
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: 50%;
        border: 8px solid #222;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 100;
        box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        pointer-events: none;
    }

    #score-display { 
        font-size: 4rem; 
        font-weight: 900; 
        color: var(--text-color);
        line-height: 1;
    }
    
    #message-display { 
        font-size: 1rem; 
        font-weight: 700;
        letter-spacing: 1px;
        color: var(--accent-color);
        text-transform: uppercase;
        margin-top: 5px;
    }

    .btn-restart {
        pointer-events: auto;
        margin-top: 15px;
        background: #222;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 100px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
    }
    .btn-restart:hover { background: #444; transform: scale(1.1); }

    #block-layer {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 200; display: none;
    }
</style>
{% endblock %}

{% block content %}
    <div id="game-board">
        <div id="pad-green" class="pad" onclick="handleInput('green')"></div>
        <div id="pad-red" class="pad" onclick="handleInput('red')"></div>
        <div id="pad-yellow" class="pad" onclick="handleInput('yellow')"></div>
        <div id="pad-blue" class="pad" onclick="handleInput('blue')"></div>
    </div>

    <div id="center-hub">
        <div style="font-size:0.8rem; text-transform: uppercase; opacity:0.6; font-weight:bold;">Nivel</div>
        <div id="score-display">1</div>
        <div id="message-display">¡Listo!</div>
        <button class="btn-restart" onclick="reiniciarJuego()">Reiniciar</button>
    </div>

    <div id="block-layer"></div>
{% endblock %}

{% block game_js %}
<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    // Accessibility-friendly musical notes (C4, E4, G4, C5)
    const frequencies = { 
        green: 261.63,  // Do (C4)
        red: 329.63,    // Mi (E4)
        yellow: 392.00, // Sol (G4)
        blue: 523.25,   // Do (C5 - High)
        error: 120 
    };

    function playTone(color, duration = 0.5) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        const osc1 = audioCtx.createOscillator();
        const osc2 = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();

        osc1.type = color === 'error' ? 'sawtooth' : 'sine';
        osc2.type = color === 'error' ? 'square' : 'triangle';
        
        const freq = frequencies[color];
        osc1.frequency.value = freq;
        osc2.frequency.value = freq * 1.005;

        filter.type = "lowpass";
        filter.frequency.value = color === 'error' ? 400 : 2000;

        osc1.connect(filter);
        osc2.connect(filter);
        filter.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        const now = audioCtx.currentTime;
        gainNode.gain.setValueAtTime(0, now);
        gainNode.gain.linearRampToValueAtTime(0.2, now + 0.1);
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);

        osc1.start(now);
        osc2.start(now);
        osc1.stop(now + duration);
        osc2.stop(now + duration);
    }

    const colors = ['green', 'red', 'yellow', 'blue'];
    let gameSequence = [];
    let playerSequence = [];
    let level = 1;
    let speed = 800;
    let isGameActive = false;

    function resetVariables() {
        gameSequence = [];
        playerSequence = [];
        level = 1;
        speed = 800;
        actualizarHUD("¡Atento!", 1);
    }

    function reiniciarJuego() {
        resetVariables();
        setTimeout(playRound, 500);
    }

    function playRound() {
        bloquearInput(true);
        playerSequence = [];
        actualizarHUD("Observa...", level);
        const randomColor = colors[Math.floor(Math.random() * colors.length)];
        gameSequence.push(randomColor);
        speed = Math.max(300, 800 - (level * 40));

        let i = 0;
        const interval = setInterval(() => {
            activarPad(gameSequence[i], true);
            i++;
            if (i >= gameSequence.length) {
                clearInterval(interval);
                setTimeout(() => {
                    bloquearInput(false);
                    actualizarHUD("¡Tu turno!", level);
                }, speed);
            }
        }, speed + 100);
    }

    function activarPad(color, isSimon) {
        const pad = document.getElementById(`pad-${color}`);
        const className = isSimon ? 'playing' : 'active';
        pad.classList.add(className);
        playTone(color, speed / 1000);
        setTimeout(() => pad.classList.remove(className), speed * 0.7);
    }

    function handleInput(color) {
        if (!isGameActive) return;
        const pad = document.getElementById(`pad-${color}`);
        pad.classList.add('active');
        playTone(color, 0.3);
        setTimeout(() => pad.classList.remove('active'), 150);
        playerSequence.push(color);
        const index = playerSequence.length - 1;
        if (playerSequence[index] !== gameSequence[index]) {
            gameOver();
            return;
        }
        if (playerSequence.length === gameSequence.length) {
            bloquearInput(true);
            actualizarHUD("¡Genial!", level);
            level++;
            setTimeout(playRound, 1000);
        }
    }

    function gameOver() {
        bloquearInput(true);
        playTone('error', 1);
        actualizarHUD("¡Ups!", level);
        speak("¡Oh no! Inténtalo de nuevo", 1.2, 1.4);
        document.body.style.backgroundColor = "#ff1744";
        setTimeout(() => {
            document.body.style.backgroundColor = "";
            reiniciarJuego();
        }, 1500);
    }

    function bloquearInput(bloquear) {
        const layer = document.getElementById('block-layer');
        layer.style.display = bloquear ? 'block' : 'none';
        isGameActive = !bloquear;
    }

    function actualizarHUD(texto, nivel) {
        document.getElementById('message-display').innerText = texto;
        document.getElementById('score-display').innerText = nivel;
    }

    document.addEventListener('DOMContentLoaded', () => { 
        try {
            if (typeof createMagicParticles === 'function') {
                createMagicParticles(['🎵', '🎶', '🎹', '🎸', '🎷', '🎺']);
            }
        } catch (e) {
            console.warn('createMagicParticles not available', e);
        }
        setTimeout(playRound, 1500); 
    });
</script>
{% endblock %}
