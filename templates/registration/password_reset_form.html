{% extends "base.html" %}

{% block title %}Recuperar Llave - Aprendo{% endblock %}

{% block extra_css %}
<style>
    .auth-container {
        min-height: calc(100vh - 80px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .auth-card {
        background: var(--card-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--card-border);
        border-radius: 32px;
        padding: 40px;
        width: 100%;
        max-width: 450px;
        box-shadow: var(--shadow);
        text-align: center;
        animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    .auth-header {
        margin-bottom: 30px;
    }

    .auth-header h1 {
        font-size: 1.8rem;
        font-weight: 800;
        margin-bottom: 10px;
        color: var(--text-color);
    }

    .auth-header p {
        opacity: 0.7;
        font-size: 1rem;
    }

    .form-group {
        text-align: left;
        margin-bottom: 25px;
    }

    .form-control {
        width: 100%;
        padding: 14px 20px;
        border-radius: 16px;
        border: 1px solid var(--card-border);
        background: rgba(255, 255, 255, 0.5);
        color: var(--text-color);
        font-family: inherit;
        font-size: 1rem;
    }

    .btn-auth {
        width: 100%;
        padding: 16px;
        border-radius: 16px;
        border: none;
        background: var(--accent-color);
        color: white;
        font-size: 1.1rem;
        font-weight: 700;
        cursor: pointer;
        box-shadow: var(--shadow);
    }

    .auth-footer {
        margin-top: 25px;
    }

    .auth-footer a {
        color: var(--secondary-color);
        text-decoration: none;
        font-size: 0.9rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div style="font-size: 3rem; margin-bottom: 15px;">🔍</div>
            <h1>¿Perdiste tu llave?</h1>
            <p>No te preocupes, dinos tu correo y te ayudaremos a recuperarla.</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <input type="email" name="email" class="form-control" placeholder="Correo electrónico" required>
            </div>

            <button type="submit" class="btn-auth">Enviar ayuda 🕊️</button>
        </form>

        <div class="auth-footer">
            <a href="{% url 'login' %}">← Volver al inicio</a>
        </div>
    </div>
</div>

<script>
    window.onload = () => {
        createMagicParticles(['🔍', '🕊️', '✨', '🗝️', '💡']);
    };
</script>
{% endblock %}
